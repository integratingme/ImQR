<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5E62;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF9966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A044FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="95" fill="white" stroke="#e0e0e0" stroke-width="2"/>

  <g transform="translate(50, 45)">
    <rect x="0" y="0" width="45" height="45" rx="10" fill="#FF5E62" opacity="0.9"/>
    <rect x="55" y="0" width="45" height="45" rx="10" fill="#38EF7D" opacity="0.9"/>
    <rect x="0" y="55" width="45" height="45" rx="10" fill="#11998e" opacity="0.9"/>
    <rect x="55" y="55" width="45" height="45" rx="10" fill="url(#aiGradient)" />
  </g>

  <!-- LOGO -->
  <text x="100" y="170" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="28" 
        fill="#333333" 
        text-anchor="middle" 
        letter-spacing="2">
    LOGO
  </text>

</svg>