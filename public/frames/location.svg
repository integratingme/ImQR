<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Drop shadow for pin (3D effect) -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 1. Card background (palette: secondary = bg, primary = accent) -->
  <rect x="10" y="10" width="380" height="480" rx="20" fill="#SECONDARY#" stroke="#e0e0e0" stroke-width="2" />

  <!-- 2. Decorative dashed line through center -->
  <path d="M 200 20 L 200 420" stroke="#cccccc" stroke-width="2" stroke-dasharray="8 8" />

  <!-- 3. QR corner frame - palette primary -->
  <g stroke="#PRIMARY#" stroke-width="6" stroke-linecap="round">
    <path d="M 40 40 L 20 40 L 20 80" />
    <path d="M 360 40 L 380 40 L 380 80" />
    <path d="M 40 360 L 20 360 L 20 320" />
    <path d="M 360 360 L 380 360 L 380 320" />
  </g>

  <!-- 4. Bottom: location pin -->
  <g transform="translate(0, 0)">
    
    <!-- Ground shadow (ellipse under pin) -->
    <ellipse cx="200" cy="475" rx="15" ry="4" fill="#000000" opacity="0.2" />

    <!-- Pin body (palette primary) -->
    <path d="M 200 470 
             Q 170 430 170 410 
             A 30 30 0 1 1 230 410 
             Q 230 430 200 470 Z" 
          fill="#PRIMARY#" 
          filter="url(#dropShadow)"/>

    <!-- Pin center circle (palette secondary) -->
    <circle cx="200" cy="410" r="10" fill="#SECONDARY#" />
    
  </g>
  
  <!-- SCAN ME button above pin -->
  <rect x="160" y="375" width="80" height="20" rx="10" fill="#SECONDARY#" stroke="#PRIMARY#" stroke-width="1"/>
  <text x="200" y="389" text-anchor="middle" fill="#PRIMARY#" font-family="Arial, sans-serif" font-size="10" font-weight="bold">SCAN ME</text>

</svg>